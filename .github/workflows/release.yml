name: Package & Release Extension

on:
  push:
    branches:
      - main
    paths:
      - manifest.json
      - '*.js'
      - 'css/**'
      - 'img/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          echo "version=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")" >> "$GITHUB_OUTPUT"

      - name: Package extension into flat ZIP
        run: |
          zip -r sellerradar-free-v${{ steps.version.outputs.version }}.zip . \
            --exclude '*.git*' \
            --exclude '.github/*' \
            --exclude 'README.md' \
            --exclude 'sellerradar-free-*.zip'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SellerRadar Free v${{ steps.version.outputs.version }}
          body: |
            ## How to install

            1. Download **`sellerradar-free-v${{ steps.version.outputs.version }}.zip`** from the Assets section below.
            2. Extract the ZIP — `manifest.json` will be **directly** inside the extracted folder (no extra nesting).
            3. Open Chrome → `chrome://extensions/` → enable **Developer mode** → click **Load unpacked** → select the extracted folder.
          files: sellerradar-free-v${{ steps.version.outputs.version }}.zip
          make_latest: true
